services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: orientapp
      POSTGRES_USER: orientapp
      POSTGRES_PASSWORD: orientapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orientapp -d orientapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
