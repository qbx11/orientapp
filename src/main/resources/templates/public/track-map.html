<!DOCTYPE html>
<html th:replace="~{layout/base-map :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${registration.competitor.fullName + ' – Trasa – OrientApp'}">Trasa – OrientApp</title>
</head>
<body>
<main>
    <nav aria-label="breadcrumb" class="breadcrumb-nav">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Zawody</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/events/{id}/results(id=${event.id})}" th:text="${event.name}">Zawody</a>
            </li>
            <li class="breadcrumb-item active" th:text="${registration.competitor.fullName}">Zawodnik</li>
        </ol>
    </nav>

    <div class="row g-4">
        <div class="col-lg-8">
            <!-- Mapa -->
            <div class="card">
                <div class="card-header fw-semibold">
                    <i class="bi bi-map me-2"></i>Trasa zawodnika
                </div>
                <div class="card-body p-2">
                    <div id="map"></div>
                </div>
                <div class="card-footer text-muted small" th:if="${#lists.isEmpty(trackPoints)}">
                    <i class="bi bi-info-circle me-1"></i>Brak zarejestrowanych punktów trasy.
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Info o rejestracji -->
            <div class="card mb-3">
                <div class="card-header fw-semibold">
                    <i class="bi bi-person me-2"></i>Zawodnik
                </div>
                <div class="card-body">
                    <dl class="row mb-0 small">
                        <dt class="col-5">Imię i nazwisko</dt>
                        <dd class="col-7" th:text="${registration.competitor.fullName}">—</dd>
                        <dt class="col-5">Klub</dt>
                        <dd class="col-7" th:text="${registration.competitor.club ?: '—'}">—</dd>
                        <dt class="col-5">Kategoria</dt>
                        <dd class="col-7" th:text="${registration.category.name}">—</dd>
                        <dt class="col-5">Chip SI</dt>
                        <dd class="col-7" th:text="${registration.chipNumber ?: '—'}">—</dd>
                    </dl>
                </div>
            </div>

            <!-- Lista punktów -->
            <div class="card" th:unless="${#lists.isEmpty(trackPoints)}">
                <div class="card-header fw-semibold">
                    <i class="bi bi-list-ol me-2"></i>Punkty trasy
                    <span class="badge bg-secondary ms-1" th:text="${#lists.size(trackPoints)}">0</span>
                </div>
                <ul class="list-group list-group-flush" style="max-height:320px;overflow-y:auto">
                    <li class="list-group-item py-1 small" th:each="tp, i : ${trackPoints}">
                        <span class="fw-semibold me-1"
                              th:text="${tp.checkpointOrder != null ? tp.checkpointOrder : i.count + '.'}">1.</span>
                        <span class="text-muted"
                              th:text="${tp.timestamp.replace('T',' ')}">—</span>
                        <br/>
                        <span class="text-muted" th:text="${tp.lat + ', ' + tp.lng}">0, 0</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const trackPoints = /*[[${trackPoints}]]*/ [];

        const map = L.map('map');
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        if (trackPoints.length > 0) {
            const latLngs = trackPoints.map(p => [p.lat, p.lng]);

            // Polyline trasy
            L.polyline(latLngs, { color: '#0d6efd', weight: 4, opacity: 0.8 }).addTo(map);

            // Marker startowy (zielony)
            const startIcon = L.divIcon({
                className: '',
                html: '<div style="background:#198754;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">S</div>',
                iconSize: [28, 28], iconAnchor: [14, 14]
            });
            // Marker końcowy (czerwony)
            const finishIcon = L.divIcon({
                className: '',
                html: '<div style="background:#dc3545;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">M</div>',
                iconSize: [28, 28], iconAnchor: [14, 14]
            });

            trackPoints.forEach((tp, i) => {
                let icon;
                if (i === 0) icon = startIcon;
                else if (i === trackPoints.length - 1) icon = finishIcon;
                else {
                    const label = tp.checkpointOrder != null ? tp.checkpointOrder : (i + 1);
                    icon = L.divIcon({
                        className: '',
                        html: `<div style="background:#0d6efd;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">${label}</div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });
                }
                const ts = tp.timestamp.replace('T', ' ');
                L.marker([tp.lat, tp.lng], { icon })
                    .addTo(map)
                    .bindPopup(`<strong>Punkt ${tp.checkpointOrder != null ? tp.checkpointOrder : (i + 1)}</strong><br>Czas: ${ts}<br><small>${tp.lat.toFixed(5)}, ${tp.lng.toFixed(5)}</small>`);
            });

            map.fitBounds(latLngs, { padding: [30, 30] });
        } else {
            map.setView([52.0, 19.0], 6);
        }
        /*]]>*/
    </script>
</main>
</body>
</html>
