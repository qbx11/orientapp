<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${event.name + ' – OrientApp'}">Zawody – OrientApp</title>
</head>
<body>
<main>
    <nav aria-label="breadcrumb" class="breadcrumb-nav">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Zawody</a></li>
            <li class="breadcrumb-item active" th:text="${event.name}">Zawody</li>
        </ol>
    </nav>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- Lewa kolumna: info + kategorie -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0" th:text="${event.name}">Nazwa</h4>
                    <span th:text="${event.status.label}"
                          th:classappend="${event.status.name() == 'OPEN'} ? 'bg-success' : (${event.status.name() == 'CLOSED'} ? 'bg-secondary' : 'bg-warning text-dark')"
                          class="badge status-badge">Status</span>
                </div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-4"><i class="bi bi-calendar3 me-1"></i>Data</dt>
                        <dd class="col-sm-8" th:text="${#temporals.format(event.date, 'dd MMMM yyyy', new java.util.Locale('pl'))}">Data</dd>
                        <dt class="col-sm-4"><i class="bi bi-geo-alt me-1"></i>Miejsce</dt>
                        <dd class="col-sm-8" th:text="${event.location}">Miejsce</dd>
                        <dt class="col-sm-4" th:if="${event.description}">Opis</dt>
                        <dd class="col-sm-8" th:if="${event.description}" th:text="${event.description}">Opis</dd>
                    </dl>
                </div>
            </div>

            <!-- Kategorie -->
            <div class="card mt-3">
                <div class="card-header"><h5 class="mb-0"><i class="bi bi-signpost me-2"></i>Kategorie tras</h5></div>
                <div th:if="${#lists.isEmpty(categories)}" class="card-body text-muted">
                    Brak zdefiniowanych kategorii.
                </div>
                <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(categories)}">
                    <li class="list-group-item d-flex justify-content-between align-items-center"
                        th:each="cat : ${categories}">
                        <span class="fw-semibold" th:text="${cat.name}">Kategoria</span>
                        <span class="text-muted small" th:if="${cat.distanceKm != null}"
                              th:text="${cat.distanceKm + ' km'}">0 km</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Prawa kolumna: przyciski + mapa -->
        <div class="col-lg-5">
            <!-- Przyciski akcji -->
            <div class="d-grid gap-2 mb-3">
                <!-- OPEN: rejestracja + regulamin, bez wyników -->
                <th:block th:if="${event.status.name() == 'OPEN'}">
                    <a th:href="@{/events/{id}/register(id=${event.id})}"
                       class="btn btn-success btn-lg">
                        <i class="bi bi-pencil-square me-2"></i>Zarejestruj się
                    </a>
                    <a th:href="@{/events/{id}/regulations(id=${event.id})}"
                       class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-file-text me-2"></i>Regulamin zawodów
                    </a>
                </th:block>

                <!-- DRAFT: info + regulamin, bez rejestracji i wyników -->
                <th:block th:if="${event.status.name() == 'DRAFT'}">
                    <div class="alert alert-warning mb-2">
                        <i class="bi bi-clock me-2"></i>Zapisy zostaną otwarte wkrótce.
                    </div>
                    <a th:href="@{/events/{id}/regulations(id=${event.id})}"
                       class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-file-text me-2"></i>Regulamin zawodów
                    </a>
                </th:block>

                <!-- CLOSED: wyniki, bez rejestracji -->
                <th:block th:if="${event.status.name() == 'CLOSED'}">
                    <a th:href="@{/events/{id}/results(id=${event.id})}"
                       class="btn btn-success btn-lg">
                        <i class="bi bi-trophy me-2"></i>Wyniki zawodów
                    </a>
                </th:block>
            </div>

            <!-- Mapa lokalizacji -->
            <div class="card" th:if="${event.latitude != null}">
                <div class="card-header fw-semibold">
                    <i class="bi bi-map me-2"></i>Lokalizacja
                    <small class="text-muted fw-normal ms-1" th:text="${event.location}"></small>
                </div>
                <div class="card-body p-2">
                    <div id="event-map" style="height:280px;width:100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${event.latitude != null}" th:inline="javascript">
        /*<![CDATA[*/
        window.addEventListener('load', function () {
            const lat = /*[[${event.latitude}]]*/ 52.0;
            const lng = /*[[${event.longitude}]]*/ 19.0;
            const locationName = /*[[${event.location}]]*/ '';

            const map = L.map('event-map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19
            }).addTo(map);
            L.marker([lat, lng])
                .addTo(map)
                .bindPopup('<strong>' + locationName + '</strong>')
                .openPopup();
        });
        /*]]>*/
    </script>
</main>
</body>
</html>
