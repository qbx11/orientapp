<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${event.name + ' – OrientApp'}">Zawody – OrientApp</title>
</head>
<body>
<main>
    <nav aria-label="breadcrumb" class="breadcrumb-nav">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Zawody</a></li>
            <li class="breadcrumb-item active" th:text="${event.name}">Zawody</li>
        </ol>
    </nav>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ===================== KARTA NAGŁÓWKOWA ===================== -->
    <div class="event-hero">
        <!-- Górna część: tytuł + akcje -->
        <div class="event-hero-top">
            <div class="event-hero-head">
                <span th:if="${event.status.name() == 'OPEN'}" class="app-badge ok big">Zapisy otwarte</span>
                <span th:if="${event.status.name() == 'DRAFT'}" class="app-badge warn big">Wkrótce</span>
                <span th:if="${event.status.name() == 'CLOSED'}" class="app-badge neutral big">Zakończone</span>
                <h1 class="event-hero-title" th:text="${event.name}">Nazwa zawodów</h1>
            </div>

            <div class="event-hero-actions">
                <a th:href="@{/events/{id}/regulations(id=${event.id})}" class="btn btn-ghost btn-hero">
                    <i class="bi bi-file-earmark-text"></i>Regulamin
                </a>

                <a th:if="${event.status.name() == 'OPEN'}"
                   th:href="@{/events/{id}/register(id=${event.id})}" class="btn btn-primary btn-hero">
                    <i class="bi bi-pencil-square"></i>Zarejestruj się
                </a>
                <a th:if="${event.status.name() == 'CLOSED'}"
                   th:href="@{/events/{id}/results(id=${event.id})}" class="btn btn-primary btn-hero">
                    <i class="bi bi-trophy"></i>Zobacz wyniki
                </a>
            </div>
        </div>

        <!-- Dolna część: pasek szybkich faktów -->
        <div class="facts-bar">
            <div class="fact-cell">
                <i class="bi bi-calendar3 fact-ico"></i>
                <div>
                    <div class="fact-label">Data</div>
                    <div class="fact-value mono"
                         th:text="${#temporals.format(event.date, 'dd MMMM yyyy', new java.util.Locale('pl'))}">19 czerwca 2026</div>
                </div>
            </div>
            <div class="fact-cell">
                <i class="bi bi-geo-alt fact-ico"></i>
                <div>
                    <div class="fact-label">Miejsce</div>
                    <div class="fact-value" th:text="${event.location}">Wrocław</div>
                </div>
            </div>
            <div class="fact-cell">
                <i class="bi bi-people fact-ico"></i>
                <div>
                    <div class="fact-label"
                         th:text="${event.status.name() == 'CLOSED'} ? 'Wystartowało' : 'Zapisani'">Zapisani</div>
                    <div class="fact-value mono" th:text="${participantCount} + ' zaw.'">5 zaw.</div>
                </div>
            </div>
            <div class="fact-cell">
                <i class="bi bi-ticket-perforated fact-ico"></i>
                <div>
                    <div class="fact-label">Limit miejsc</div>
                    <div class="fact-value mono"
                         th:text="${event.maxParticipants != null} ? (${event.maxParticipants} + ' zaw.') : 'Bez limitu'">60 zaw.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== SEKCJA SZCZEGÓŁÓW ===================== -->
    <div class="detail-grid">
        <!-- Lewa kolumna -->
        <div class="detail-col">
            <!-- O zawodach -->
            <div class="detail-card" th:if="${event.description}">
                <div class="detail-card-header">
                    <i class="bi bi-file-earmark-text"></i><span>O zawodach</span>
                </div>
                <div class="detail-card-prose" th:text="${event.description}">Opis zawodów.</div>
            </div>

            <!-- Kategorie tras -->
            <div class="detail-card">
                <div class="detail-card-header">
                    <i class="bi bi-signpost-split"></i><span>Kategorie tras</span>
                </div>
                <div th:if="${#lists.isEmpty(categories)}" class="detail-card-prose text-muted">
                    Brak zdefiniowanych kategorii.
                </div>
                <div th:unless="${#lists.isEmpty(categories)}">
                    <div class="cat-row" th:each="cat : ${categories}">
                        <span class="cat-code mono" th:text="${cat.name}">TP12</span>
                        <span class="cat-dist mono" th:if="${cat.distanceKm != null}"
                              th:text="${cat.distanceKm} + ' km'">4.2 km</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Prawa kolumna: mapa -->
        <div class="detail-col" th:if="${event.latitude != null}">
            <div class="detail-card map-card">
                <div class="detail-card-header">
                    <i class="bi bi-map"></i><span>Lokalizacja</span>
                    <span class="map-place" th:text="${event.location}"></span>
                </div>
                <div class="map-card-body">
                    <div id="event-map"></div>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${event.latitude != null}" th:inline="javascript">
        /*<![CDATA[*/
        window.addEventListener('load', function () {
            const lat = /*[[${event.latitude}]]*/ 52.0;
            const lng = /*[[${event.longitude}]]*/ 19.0;
            const locationName = /*[[${event.location}]]*/ '';

            const map = L.map('event-map', { scrollWheelZoom: false }).setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19
            }).addTo(map);
            L.marker([lat, lng])
                .addTo(map)
                .bindPopup('<strong>' + locationName + '</strong>')
                .openPopup();
        });
        /*]]>*/
    </script>
</main>
</body>
</html>
