<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Zawody – OrientApp</title>
</head>
<body>
<main>
    <div th:if="${#lists.isEmpty(upcomingEvents) and #lists.isEmpty(pastEvents)}" class="alert alert-info mt-3">
        <i class="bi bi-info-circle me-2"></i>Brak zawodów.
    </div>

    <!-- Nadchodzące -->
    <div th:unless="${#lists.isEmpty(upcomingEvents)}">
        <h5 class="text-muted fw-semibold text-uppercase small mb-3 mt-1">
            <i class="bi bi-calendar-event me-1"></i>Nadchodzące zawody
        </h5>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
            <div class="col" th:each="event : ${upcomingEvents}">
                <a th:href="@{/events/{id}(id=${event.id})}" class="text-decoration-none text-reset">
                    <div class="card h-100 event-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0" th:text="${event.name}">Nazwa</h5>
                                <span th:text="${event.status.label}"
                                      th:classappend="${event.status.name() == 'OPEN'} ? 'bg-success' : 'bg-warning text-dark'"
                                      class="badge status-badge ms-2 flex-shrink-0">Status</span>
                            </div>
                            <p class="card-text text-muted small mb-1">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(event.date, 'dd.MM.yyyy')}">Data</span>
                            </p>
                            <p class="card-text text-muted small mb-2">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span th:text="${event.location}">Miejsce</span>
                            </p>
                            <p class="card-text small" th:if="${event.description}"
                               th:text="${#strings.abbreviate(event.description, 120)}">Opis</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Zakończone -->
    <div th:unless="${#lists.isEmpty(pastEvents)}">
        <h5 class="text-muted fw-semibold text-uppercase small mb-3">
            <i class="bi bi-archive me-1"></i>Zakończone zawody
        </h5>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="event : ${pastEvents}">
                <a th:href="@{/events/{id}(id=${event.id})}" class="text-decoration-none text-reset">
                    <div class="card h-100 event-card border-secondary">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0 text-secondary" th:text="${event.name}">Nazwa</h5>
                                <span class="badge bg-secondary status-badge ms-2 flex-shrink-0"
                                      th:text="${event.status.label}">Zakończone</span>
                            </div>
                            <p class="card-text text-muted small mb-1">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(event.date, 'dd.MM.yyyy')}">Data</span>
                            </p>
                            <p class="card-text text-muted small mb-2">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span th:text="${event.location}">Miejsce</span>
                            </p>
                            <p class="small text-muted mb-0">
                                <i class="bi bi-trophy me-1"></i>Wyniki dostępne
                            </p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
