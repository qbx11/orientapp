<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${event.name + ' – Regulamin – OrientApp'}">Regulamin – OrientApp</title>
</head>
<body>
<main>
    <nav aria-label="breadcrumb" class="breadcrumb-nav">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Zawody</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/events/{id}(id=${event.id})}" th:text="${event.name}">Zawody</a>
            </li>
            <li class="breadcrumb-item active">Regulamin</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0">
            <i class="bi bi-file-text me-2"></i>Regulamin –
            <span th:text="${event.name}">Zawody</span>
        </h2>
        <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Powrót
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div th:if="${event.regulations != null and !#strings.isEmpty(event.regulations)}"
                 style="white-space: pre-wrap;"
                 th:text="${event.regulations}">Treść regulaminu</div>
            <div th:unless="${event.regulations != null and !#strings.isEmpty(event.regulations)}"
                 class="alert alert-info mb-0">
                <i class="bi bi-info-circle me-2"></i>
                Regulamin tych zawodów nie został jeszcze opublikowany.
            </div>
        </div>
    </div>
</main>
</body>
</html>
