<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Logowanie – OrientApp</title>
</head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white text-center py-3">
                    
                    <small class="text-secondary">Panel administratora</small>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Nieprawidłowy login lub hasło.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2">
                        <i class="bi bi-check-circle me-1"></i>
                        Wylogowano pomyślnie.
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Email</label>
                            <input type="email" class="form-control" id="username" name="username"
                                   placeholder="Adres email" autofocus/>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Hasło</label>
                            <input type="password" class="form-control" id="password" name="password"/>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">
                           Zaloguj
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted small mt-3">
                <a th:href="@{/}" class="text-muted">← Wróć do strony głównej</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
