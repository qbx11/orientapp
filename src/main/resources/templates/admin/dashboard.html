<!DOCTYPE html>
<html th:replace="~{layout/admin :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Dashboard – OrientApp Admin</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
        <div>
            <h2 class="h4 mb-1">Twoje zawody</h2>
            <p class="text-muted small mb-0">
                <span th:text="${#lists.size(summaries)}">0</span> zawodów ·
                <span th:text="${pendingTotal}">0</span> zgłoszeń oczekuje na decyzję
            </p>
        </div>
        <a th:href="@{/admin/events/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nowe zawody
        </a>
    </div>

    <!-- Pusty stan -->
    <div th:if="${#lists.isEmpty(summaries)}" class="card">
        <div class="card-body text-center py-5">
            <i class="bi bi-calendar-plus d-block mb-3" style="font-size:2.5rem;color:var(--ink-3)"></i>
            <p class="text-muted mb-3">Nie masz jeszcze żadnych zawodów.</p>
            <a th:href="@{/admin/events/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Utwórz pierwsze zawody
            </a>
        </div>
    </div>

    <!-- Siatka kart zawodów -->
    <div class="row g-4" th:unless="${#lists.isEmpty(summaries)}">
        <div class="col-md-6 col-xl-4" th:each="s : ${summaries}">
            <div class="card event-card h-100 position-relative">
                <div class="card-body d-flex flex-column">
                    <!-- Status + sygnał oczekujących -->
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span th:text="${s.event.status.label}"
                              th:class="'app-badge ' + (${s.event.status.name() == 'OPEN'} ? 'ok' : (${s.event.status.name() == 'DRAFT'} ? 'warn' : 'neutral'))">
                            Status</span>
                        <span th:if="${s.pending > 0}" class="app-badge warn"
                              th:text="${s.pending} + ' oczekuje'">0 oczekuje</span>
                    </div>

                    <!-- Nazwa (cały kafel klikalny -> panel zawodów) -->
                    <h5 class="mb-1">
                        <a th:href="@{/admin/events/{id}(id=${s.event.id})}"
                           class="stretched-link text-decoration-none ink" th:text="${s.event.name}">Nazwa</a>
                    </h5>
                    <div class="meta-row small mb-3">
                        <i class="bi bi-calendar3"></i>
                        <span th:text="${#temporals.format(s.event.date, 'dd.MM.yyyy')}">01.01.2026</span>
                        <span class="mx-1">·</span>
                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${s.event.location}">Miejsce</span>
                    </div>

                    <!-- Statystyki zgłoszeń -->
                    <div class="dash-stats mt-auto">
                        <div class="dash-stat" th:classappend="${s.pending > 0} ? 'is-pending'">
                            <div class="v mono" th:text="${s.pending}">0</div>
                            <div class="l">Oczekuje</div>
                        </div>
                        <div class="dash-stat">
                            <div class="v mono" th:text="${s.total}">0</div>
                            <div class="l">Zgłoszeń</div>
                        </div>
                        <div class="dash-stat">
                            <div class="v mono" th:text="${s.categories}">0</div>
                            <div class="l">Kategorii</div>
                        </div>
                        <div class="dash-stat">
                            <div class="v mono" th:text="${s.withResults}">0</div>
                            <div class="l">Wyników</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
