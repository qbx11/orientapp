<!DOCTYPE html>
<html th:replace="~{layout/admin :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${editMode} ? 'Edycja zawodów – Admin' : 'Nowe zawody – Admin'">Zawody – Admin</title>
</head>
<body>
<main>
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/events}">Zawody</a></li>
            <li class="breadcrumb-item active"
                th:text="${editMode} ? ${event.name} : 'Nowe zawody'">Formularz</li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Formularz zawodów -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header fw-semibold"
                     th:text="${editMode} ? 'Edytuj zawody' : 'Utwórz nowe zawody'">Formularz</div>
                <div class="card-body">
                    <form th:action="${editMode} ? @{/admin/events/{id}(id=${event.id})} : @{/admin/events}"
                          th:object="${eventForm}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label">Nazwa <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="Nazwa zawodów"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="date" class="form-label">Data <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="date" th:field="*{date}"
                                       th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{date}"></div>
                            </div>
                            <div class="col-sm-6">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" th:field="*{status}">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}">STATUS</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Lokalizacja <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="location" th:field="*{location}"
                                   th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                                   placeholder="np. Wrocław"/>
                            <div class="invalid-feedback" th:errors="*{location}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="latitude" class="form-label">Szerokość geo.</label>
                                <input type="number" step="0.0001" class="form-control" id="latitude"
                                       th:field="*{latitude}" placeholder="51.1079"/>
                            </div>
                            <div class="col-sm-6">
                                <label for="longitude" class="form-label">Długość geo.</label>
                                <input type="number" step="0.0001" class="form-control" id="longitude"
                                       th:field="*{longitude}" placeholder="17.0385"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Opis</label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      rows="4" placeholder="Opis zawodów..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="regulations" class="form-label">Regulamin zawodów</label>
                            <textarea class="form-control" id="regulations" th:field="*{regulations}"
                                      rows="8" placeholder="Treść regulaminu widoczna dla uczestników..."></textarea>
                            <div class="form-text">Wyświetlany po kliknięciu „Regulamin zawodów” na stronie publicznej.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${editMode} ? 'Zapisz zmiany' : 'Utwórz zawody'">Zapisz</span>
                            </button>
                            <a th:href="@{/admin/events}" class="btn btn-outline-secondary">Anuluj</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Kategorie (tylko w trybie edycji) -->
        <div class="col-lg-5" th:if="${editMode}">
            <div class="card">
                <div class="card-header fw-semibold">
                    <i class="bi bi-signpost me-2"></i>Kategorie tras
                </div>
                <ul class="list-group list-group-flush">
                    <li th:if="${categories.isEmpty()}"
                        class="list-group-item text-muted text-center py-3">Brak kategorii</li>
                    <li class="list-group-item d-flex justify-content-between align-items-center"
                        th:each="cat : ${categories}">
                        <div>
                            <span class="fw-semibold" th:text="${cat.name}">Kat</span>
                            <span class="text-muted small ms-2" th:if="${cat.distanceKm != null}"
                                  th:text="${cat.distanceKm + ' km'}"></span>
                        </div>
                        <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post">
                            <input type="hidden" name="eventId" th:value="${event.id}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Usunąć kategorię?')">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </form>
                    </li>
                </ul>
                <div class="card-footer">
                    <form th:action="@{/admin/events/{id}/categories(id=${event.id})}"
                          th:object="${categoryForm}" method="post" class="row g-2">
                        <div class="col-5">
                            <input type="text" class="form-control form-control-sm" th:field="*{name}"
                                   placeholder="Nazwa (np. TP12)"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        </div>
                        <div class="col-4">
                            <input type="number" step="0.1" class="form-control form-control-sm"
                                   th:field="*{distanceKm}" placeholder="km"/>
                        </div>
                        <div class="col-3">
                            <button type="submit" class="btn btn-sm btn-primary w-100">
                                <i class="bi bi-plus-lg"></i> Dodaj
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Skróty nawigacyjne -->
            <div class="d-flex flex-column gap-2 mt-3">
                <a th:href="@{/admin/events/{id}/registrations(id=${event.id})}"
                   class="btn btn-outline-primary">
                    <i class="bi bi-people me-2"></i>Zarządzaj zgłoszeniami
                </a>
                <a th:href="@{/admin/events/{id}/results(id=${event.id})}"
                   class="btn btn-outline-success">
                    <i class="bi bi-trophy me-2"></i>Panel wyników
                </a>
                <a th:href="@{/events/{id}/results(id=${event.id})}"
                   class="btn btn-outline-secondary" target="_blank">
                    <i class="bi bi-eye me-2"></i>Podgląd publiczny wyników
                </a>
            </div>

        </div>
    </div>
</main>
</body>
</html>
