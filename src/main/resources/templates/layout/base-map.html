<!DOCTYPE html>
<html lang="pl" th:fragment="layout(title, content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="${title}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { padding-top: 56px; }
        .status-badge { font-size: .75rem; }
        #map { height: 480px; border-radius: .375rem; }
        footer a { color: #adb5bd; } footer a:hover { color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-compass me-1"></i>OrientApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Zawody</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Panel admina</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}"><i class="bi bi-gear me-1"></i>Panel admina</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('ADMIN')">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link">
                            <i class="bi bi-box-arrow-right me-1"></i>Wyloguj
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <th:block th:replace="${content}"/>
</main>

<footer class="bg-dark text-secondary py-5 mt-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <h5 class="text-white fw-bold mb-2"><i class="bi bi-compass me-1"></i>OrientApp</h5>
                <p class="small mb-0">Platforma zarządzania zawodami<br>w biegu na orientację.</p>
            </div>
            <div class="col-md-4">
                <h6 class="text-white mb-2">Kontakt</h6>
                <p class="small mb-1"><i class="bi bi-envelope me-1"></i>kontakt@orientapp.pl</p>
                <p class="small mb-0"><i class="bi bi-telephone me-1"></i>+48 000 000 000</p>
            </div>
            <div class="col-md-4 text-md-end">
                <h6 class="text-white mb-2">Linki</h6>
                <ul class="list-unstyled small mb-0">
                    <li><a th:href="@{/}" class="text-decoration-none">Zawody</a></li>
                    <li sec:authorize="isAnonymous()">
                        <a th:href="@{/login}" class="text-decoration-none">Logowanie (admin)</a>
                    </li>
                </ul>
            </div>
        </div>
        <hr class="border-secondary mt-4 mb-3"/>
        <p class="text-center small mb-0">&copy; 2026 OrientApp </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZ/ZeWZhK3lMEjMqXR3mP1OHXE"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
