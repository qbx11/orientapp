<!DOCTYPE html>
<html lang="pl" th:fragment="layout(title, content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="${title}"/>
    <th:block th:replace="~{fragments/chrome :: head-assets}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{fragments/chrome :: topbar}"></header>

<main class="flex-grow-1 fade-up" style="padding: 2.5rem 48px;">
    <th:block th:replace="${content}"/>
</main>

<footer th:replace="~{fragments/chrome :: footer}"></footer>

<th:block th:replace="~{fragments/chrome :: body-scripts}"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
