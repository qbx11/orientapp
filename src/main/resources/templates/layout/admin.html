<!DOCTYPE html>
<html lang="pl" th:fragment="layout(title, content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="${title}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: #212529;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #adb5bd;
            padding: .5rem 1.25rem;
            border-radius: .375rem;
            margin: .1rem .5rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background: #343a40;
        }
        .sidebar .nav-link i { width: 1.4rem; }
        .sidebar-brand {
            color: #fff;
            font-weight: 700;
            padding: .5rem 1.25rem 1rem;
            display: block;
            font-size: 1.1rem;
            text-decoration: none;
            border-bottom: 1px solid #343a40;
            margin-bottom: .5rem;
        }
        .main-content { padding: 1.5rem; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0" style="min-height:100vh">

        <!-- Sidebar -->
        <div class="col-auto sidebar d-flex flex-column" style="width:220px">
            <a th:href="@{/admin}" class="sidebar-brand">
                OrientApp
            </a>
            <nav class="nav flex-column flex-grow-1">
                <a class="nav-link" th:href="@{/admin}"
                   th:classappend="${currentUri == '/admin'} ? 'active'">
                    Dashboard
                </a>
                <a class="nav-link" th:href="@{/admin/events}"
                   th:classappend="${currentUri.startsWith('/admin/events')} ? 'active'">
                    Zawody
                </a>
            </nav>
            <div class="p-3 border-top border-secondary mt-auto">
                <small class="text-secondary d-block mb-2" sec:authentication="name">admin</small>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
                        <i class="bi bi-box-arrow-right me-1"></i>Wyloguj
                    </button>
                </form>
            </div>
        </div>

        <!-- Main content -->
        <div class="col main-content">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <th:block th:replace="${content}"/>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZ/ZeWZhK3lMEjMqXR3mP1OHXE"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</body>
</html>
