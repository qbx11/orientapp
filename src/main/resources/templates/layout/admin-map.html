<!DOCTYPE html>
<html lang="pl" th:fragment="layout(title, content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="${title}"/>
    <th:block th:replace="~{fragments/chrome :: head-assets}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 420px; border-radius: var(--r-card); cursor: crosshair; }
    </style>
</head>
<body>
<div class="d-flex">

    <aside th:replace="~{fragments/chrome :: admin-sidebar}"></aside>

    <div class="admin-main fade-up">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <th:block th:replace="${content}"/>
    </div>
</div>

<th:block th:replace="~{fragments/chrome :: body-scripts}"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
