<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="weatherCard" class="card">
    <div class="card-header fw-semibold">
        <i class="bi bi-cloud-sun me-2"></i>Aktualna pogoda
        <small class="text-muted fw-normal ms-1"
               th:if="${weather != null}" th:text="${event.location}"></small>
    </div>

    <!-- Pogoda niedostępna -->
    <div th:unless="${weather != null}" class="card-body text-muted text-center py-3">
        <i class="bi bi-cloud-slash me-2"></i>Pogoda chwilowo niedostępna
    </div>

    <!-- Dane pogodowe -->
    <div th:if="${weather != null}" class="card-body">
        <div class="d-flex align-items-center gap-3">
            <img th:src="${weather.iconUrl()}" alt="ikona pogody" width="64" height="64"
                 style="filter: drop-shadow(0 1px 3px rgba(0,0,0,.2))"/>
            <div>
                <div class="fs-3 fw-bold"
                     th:text="${#numbers.formatDecimal(weather.tempCelsius, 1, 1) + ' °C'}">
                    0 °C
                </div>
                <div class="text-muted text-capitalize"
                     th:text="${weather.description}">opis</div>
            </div>
        </div>
        <hr class="my-2"/>
        <div class="row row-cols-2 g-2 small text-muted">
            <div class="col">
                <i class="bi bi-droplet me-1"></i>Wilgotność:
                <strong th:text="${weather.humidity + ' %'}">0 %</strong>
            </div>
            <div class="col" th:if="${weather.windSpeed != null}">
                <i class="bi bi-wind me-1"></i>Wiatr:
                <strong th:text="${#numbers.formatDecimal(weather.windSpeed, 1, 1) + ' m/s'}">0 m/s</strong>
            </div>
        </div>
    </div>
</div>

</body>
</html>
