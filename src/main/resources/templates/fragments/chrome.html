<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>OrientApp — fragmenty chrome</title></head>
<body>

<!-- ======================================================================
     Zasoby do <head> — fonty, ikony, design system, skrypt motywu.
     Skrypt motywu MUSI być w <head>, by ustawić motyw przed renderem.
     ====================================================================== -->
<th:block th:fragment="head-assets">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/orientapp.css}"/>
    <script th:src="@{/js/orientapp.js}"></script>
</th:block>

<!-- ======================================================================
     Znak flagi (placeholder SVG). Param: size w px. Finalne logo = obraz.
     ====================================================================== -->
<span th:fragment="flagmark(size)" class="flagmark"
      th:style="'width:' + ${size} + 'px;height:' + ${size} + 'px'">
    <svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true"
         xmlns="http://www.w3.org/2000/svg">
        <polygon class="fm-paper" points="0,0 100,0 0,100"/>
        <polygon class="fm-flag" points="100,0 100,100 0,100"/>
        <line class="fm-line" x1="100" y1="0" x2="0" y2="100" stroke-width="2"/>
    </svg>
</span>

<!-- Wordmark -->
<span th:fragment="wordmark" class="wordmark">Orient<span class="accent">App</span></span>

<!-- Przycisk przełącznika motywu -->
<button th:fragment="theme-toggle" type="button" class="theme-toggle"
        data-theme-toggle aria-label="Przełącz motyw">
    <i class="bi bi-moon-stars"></i>
    <i class="bi bi-sun"></i>
</button>

<!-- ======================================================================
     Górny pasek (publiczny) — chrome, sticky
     ====================================================================== -->
<header th:fragment="topbar" class="topbar">
    <div class="d-flex align-items-center justify-content-between w-100"
         style="padding: 0 48px;">
        <a th:href="@{/}" class="brand text-decoration-none">
            <span th:replace="~{fragments/chrome :: flagmark(30)}"></span>
            <span th:replace="~{fragments/chrome :: wordmark}"></span>
        </a>
        <nav class="nav-links">
            <form th:action="@{/logout}" method="post" class="d-inline m-0"
                  sec:authorize="isAuthenticated()">
                <button type="submit"><i class="bi bi-box-arrow-right me-1"></i>Wyloguj</button>
            </form>
            <span th:replace="~{fragments/chrome :: theme-toggle}"></span>
        </nav>
    </div>
</header>

<!-- ======================================================================
     Stopka — chrome, 3 kolumny + pasek copyright
     ====================================================================== -->
<footer th:fragment="footer" class="app-footer mt-auto py-5">
    <div style="padding: 0 48px;">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <span th:replace="~{fragments/chrome :: flagmark(26)}"></span>
                    <span th:replace="~{fragments/chrome :: wordmark}"></span>
                </div>
                <p class="small mb-0">Platforma zarządzania zawodami<br>w biegu na orientację.</p>
            </div>
            <div class="col-md-4">
                <h6 class="mb-2">Kontakt</h6>
                <p class="small mb-1"><i class="bi bi-envelope me-2"></i>kontakt@orientapp.pl</p>
                <p class="small mb-0"><i class="bi bi-telephone me-2"></i>+48 000 000 000</p>
            </div>
            <div class="col-md-4 text-md-end">
                <h6 class="mb-2">Linki</h6>
                <ul class="list-unstyled small mb-0">
                    <li><a th:href="@{/}">Zawody</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">Panel admina</a></li>
                    <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Panel admina</a></li>
                </ul>
            </div>
        </div>
        <hr class="mt-4 mb-3" style="border-color: var(--chrome-border); opacity: 1;"/>
        <p class="text-center small mb-0">&copy; 2026 OrientApp</p>
    </div>
</footer>

<!-- ======================================================================
     Boczne menu admina — chrome
     ====================================================================== -->
<aside th:fragment="admin-sidebar" class="admin-sidebar">
    <a th:href="@{/admin}" class="brand text-decoration-none">
        <span th:replace="~{fragments/chrome :: flagmark(26)}"></span>
        <span th:replace="~{fragments/chrome :: wordmark}"></span>
    </a>
    <nav class="flex-grow-1">
        <a class="nav-link" th:href="@{/admin}"
           th:classappend="${currentUri == '/admin'} ? 'active'">
            <i class="bi bi-grid-1x2"></i>Dashboard
        </a>
        <a class="nav-link" th:href="@{/admin/events}"
           th:classappend="${currentUri != null and currentUri.startsWith('/admin/events')} ? 'active'">
            <i class="bi bi-list-ul"></i>Zawody
        </a>
    </nav>
    <div class="mt-auto">
        <div class="d-flex align-items-center justify-content-between mb-2 px-1">
            <span th:replace="~{fragments/chrome :: theme-toggle}"></span>
        </div>
        <div class="admin-user">
            <span class="admin-avatar"
                  th:text="${#authentication != null ? #strings.toUpperCase(#strings.substring(#authentication.name,0,1)) : 'A'}">A</span>
            <div>
                <div class="name" sec:authentication="name">admin</div>
                <div class="role">Administrator</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" class="mt-2">
            <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Wyloguj
            </button>
        </form>
    </div>
</aside>

<!-- Skrypty wspólne (koniec <body>) -->
<th:block th:fragment="body-scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZ/ZeWZhK3lMEjMqXR3mP1OHXE"
            crossorigin="anonymous"></script>
</th:block>

</body>
</html>
