<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nie znaleziono – OrientApp</title>
</head>
<body>
<main>
    <div class="text-center py-5">
        <div class="display-1 fw-bold text-muted">404</div>
        <h2 class="mt-3" th:text="${errorTitle} ?: 'Nie znaleziono'">Nie znaleziono</h2>
        <p class="text-muted" th:text="${errorMessage} ?: 'Żądany zasób nie istnieje.'">Żądany zasób nie istnieje.</p>
        <a th:href="@{/}" class="btn btn-primary mt-3">
            <i class="bi bi-house me-1"></i>Wróć na stronę główną
        </a>
    </div>
</main>
</body>
</html>
