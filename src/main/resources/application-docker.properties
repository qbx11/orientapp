# Profil uruchamiany w kontenerze (docker-compose) — PostgreSQL
spring.datasource.url=jdbc:postgresql://db:5432/orientapp
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=orientapp
spring.datasource.password=orientapp

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# H2 console nie ma sensu na PostgreSQL
spring.h2.console.enabled=false
